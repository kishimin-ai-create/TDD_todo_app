name: Backend CI

on: ["push", "pull_request"]

permissions:
  contents: read
  pull-requests: write

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v3
        id: node_modules_cache
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Install dependencies
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: backend

  check:
    needs: install

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache@v3
        id: node_modules_cache
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Run Type Check
        run: npm run typecheck
        working-directory: backend

      - name: Run Lint
        run: npm run lint
        working-directory: backend

  unit-test:
    needs: install

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache@v3
        id: node_modules_cache
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Vitest unit test #CI環境でnpm vitestを実行
        run: npm test
        working-directory: backend

      - name: "Report Vitest Result"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            // 以下は pull request 以外では発火させないための処理です。
            // if: always() と組み合わせると不要になる気がしますが、いったんコレで。
            if (!context.payload.pull_request) {
              console.log("Not running on a pull request.");
              process.exit(0);
            }

            const TEST_RESULT_PATH = "backend/test-result.json";

            if (!fs.existsSync(TEST_RESULT_PATH)) {
              console.log(`Test result file not found at ${TEST_RESULT_PATH}.`);
              process.exit(1);
            }

            // Vitest の実行結果ファイルを読み込みます。
            const result = JSON.parse(fs.readFileSync(TEST_RESULT_PATH, "utf8"));

            if (result.numTotalTests === 0) {
              console.log("No test case.");
              process.exit(1);
            }

            const runLink = `${process.env.GITHUB_SERVER_URL || "https://github.com"}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            // Vitest の実行結果を pull request のコメントとしてまとめます。
            const body = `
            # テスト結果\n
            **${result.success ? "全テスト成功" : "失敗したテストあり"}**\n
            \n
            ## テストスイート\n
            - 総件数: ${result.numTotalTestSuites} 件
              - 成功: ${result.numPassedTestSuites} 件
              - 失敗: ${result.numFailedTestSuites} 件
              - 保留: ${result.numPendingTestSuites} 件
            \n
            ## テストケース\n
            - 総件数: ${result.numTotalTests} 件
              - 成功: ${result.numPassedTests} 件
              - 失敗: ${result.numFailedTests} 件
              - 保留: ${result.numPendingTests} 件
            \n
            ## 全量レポート リンク\n
            (Actions run): ${runLink}\n
            \n
            _Generated by workflow ${process.env.GITHUB_WORKFLOW || ""}_
            `;

            // まとめたコメント(body)を、pull request に書き込みます。
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
