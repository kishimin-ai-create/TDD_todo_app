name: CI (PR)

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      # Unit / Integration (Vitest)
      - name: Run unit & integration tests
        run: npm run test

      # Storybook build (壊れていないか確認)
      - name: Build Storybook
        run: npm run build-storybook -- --quiet

      # Vite build (dist/ must exist before vite preview can serve)
      - name: Build frontend
        run: npm run build

      # Playwright merge gate（auth + app/todo CRUD happy paths, Chromium のみ）
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright merge-gate tests
        run: npx playwright test --grep "@merge" --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
