name: CI (Nightly)

on:
  schedule:
    - cron: '0 18 * * *' # UTC 18:00 = JST 03:00
  workflow_dispatch:

jobs:
  backend:
    name: Backend CI (Small + Medium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run small tests
        run: npm run test:small

      - name: Run medium tests
        run: npm run test:medium

  frontend:
    name: Frontend CI (Small + Medium + Large)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run small tests
        run: npm run test:small

      - name: Run medium tests
        run: npm run test:medium

      - name: Build Storybook
        run: npm run build-storybook -- --quiet

      - name: Build app
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run medium E2E tests
        run: npm run test:e2e:medium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Run large E2E tests
        if: always()
        run: npm run test:e2e:large
        env:
          RUN_VISUAL_TESTS: 1
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload snapshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs
          path: frontend/test-results/
          retention-days: 7
