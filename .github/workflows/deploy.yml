name: Deploy to Sakura Cloud

on:
  push:
    branches: [main]

# Required GitHub Secrets:
#   SAKURA_SSH_PRIVATE_KEY  - SSH private key (Ed25519 or RSA)
#   SAKURA_HOST             - Server hostname or IP address
#   SAKURA_USER             - SSH username
#   SAKURA_KNOWN_HOST       - Pinned server public key (obtain once with:
#                             ssh-keyscan -H <server> from a trusted network)

env:
  DEPLOY_PATH: /var/www/tdd-todo-app
  NODE_VERSION: 20

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # ── Frontend ────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend unit tests
        working-directory: backend
        # Integration tests require a live MySQL instance; unit tests are
        # sufficient as a deployment gate here.
        run: npm run test:unit

      - name: Build backend
        working-directory: backend
        run: npm run build

      # ── SSH Setup ───────────────────────────────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SAKURA_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        env:
          SAKURA_KNOWN_HOST: ${{ secrets.SAKURA_KNOWN_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SAKURA_KNOWN_HOST" >> ~/.ssh/known_hosts

      # ── Remote Directory Setup ───────────────────────────────────────────────
      - name: Create remote directories
        env:
          SSH_USER: ${{ secrets.SAKURA_USER }}
          SSH_HOST: ${{ secrets.SAKURA_HOST }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            "mkdir -p \
              ${{ env.DEPLOY_PATH }}/frontend \
              ${{ env.DEPLOY_PATH }}/backend/dist/infrastructure \
              ${{ env.DEPLOY_PATH }}/backend/migrations"

      # ── Deploy Frontend (static files → served by Nginx) ────────────────────
      - name: Deploy frontend
        env:
          SSH_USER: ${{ secrets.SAKURA_USER }}
          SSH_HOST: ${{ secrets.SAKURA_HOST }}
        run: |
          rsync -avz --delete frontend/dist/ \
            "$SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/frontend/"

      # ── Deploy Backend ───────────────────────────────────────────────────────
      - name: Deploy backend build artifacts
        env:
          SSH_USER: ${{ secrets.SAKURA_USER }}
          SSH_HOST: ${{ secrets.SAKURA_HOST }}
        run: |
          rsync -avz --delete backend/dist/ \
            "$SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/backend/dist/"
          rsync -avz --delete backend/migrations/ \
            "$SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/backend/migrations/"
          rsync -avz \
            backend/package.json \
            backend/package-lock.json \
            backend/ecosystem.config.cjs \
            "$SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/backend/"

      - name: Install production dependencies on server
        env:
          SSH_USER: ${{ secrets.SAKURA_USER }}
          SSH_HOST: ${{ secrets.SAKURA_HOST }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            "cd ${{ env.DEPLOY_PATH }}/backend && npm ci --omit=dev"

      # ── Database Migration ───────────────────────────────────────────────────
      - name: Backup database before migration
        env:
          SSH_USER: ${{ secrets.SAKURA_USER }}
          SSH_HOST: ${{ secrets.SAKURA_HOST }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            "mysqldump --defaults-file=${{ env.DEPLOY_PATH }}/backend/.my.cnf \
              TDDTodoAppDB > /var/backups/tdd-todo-app-\$(date +%Y%m%d%H%M%S).sql"

      - name: Run database migrations
        env:
          SSH_USER: ${{ secrets.SAKURA_USER }}
          SSH_HOST: ${{ secrets.SAKURA_HOST }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" \
            "cd ${{ env.DEPLOY_PATH }}/backend && node dist/infrastructure/migrate.mjs"

      # ── Restart Application ──────────────────────────────────────────────────
      - name: Restart backend service
        env:
          SSH_USER: ${{ secrets.SAKURA_USER }}
          SSH_HOST: ${{ secrets.SAKURA_HOST }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            if pm2 describe tdd-todo-app > /dev/null 2>&1; then
              pm2 reload tdd-todo-app --update-env
            else
              pm2 start /var/www/tdd-todo-app/backend/ecosystem.config.cjs
            fi
            pm2 save
          EOF
